<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </radialGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8c97c"/>
      <stop offset="50%" stop-color="#c8a45c"/>
      <stop offset="100%" stop-color="#a07830"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>
  <!-- Outer ring -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="url(#gold)" stroke-width="4" opacity="0.4"/>
  <!-- Yin-yang inspired swirl (Dao) -->
  <path d="M256 36 A220 220 0 0 1 256 476 A110 110 0 0 0 256 256 A110 110 0 0 1 256 36" fill="url(#gold)" opacity="0.15"/>
  <!-- Circuit node dots -->
  <circle cx="256" cy="36" r="8" fill="#c8a45c" opacity="0.8"/>
  <circle cx="256" cy="476" r="8" fill="#c8a45c" opacity="0.8"/>
  <circle cx="36" cy="256" r="6" fill="#c8a45c" opacity="0.5"/>
  <circle cx="476" cy="256" r="6" fill="#c8a45c" opacity="0.5"/>
  <!-- Anchor symbol (锚点) -->
  <g transform="translate(256,256)" fill="none" stroke="url(#gold)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round">
    <!-- Anchor ring -->
    <circle cx="0" cy="-100" r="28" fill="url(#gold)" stroke="none"/>
    <!-- Anchor shaft -->
    <line x1="0" y1="-72" x2="0" y2="100"/>
    <!-- Anchor cross bar -->
    <line x1="-60" y1="-30" x2="60" y2="-30"/>
    <!-- Anchor flukes -->
    <path d="M-80 100 Q-80 40 0 100 Q80 40 80 100"/>
    <!-- Small circuit lines -->
    <line x1="-60" y1="-30" x2="-90" y2="-30" stroke-width="4" opacity="0.5"/>
    <line x1="60" y1="-30" x2="90" y2="-30" stroke-width="4" opacity="0.5"/>
    <circle cx="-95" cy="-30" r="5" fill="#c8a45c" opacity="0.6"/>
    <circle cx="95" cy="-30" r="5" fill="#c8a45c" opacity="0.6"/>
  </g>
</svg>
